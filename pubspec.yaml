name: repchamp
description: "Fitness Rep Counter App with Pose Detection & Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  google_mlkit_pose_detection: ^0.12.0
  camera: ^0.11.1
  flutter_riverpod: ^2.6.1
  supabase_flutter: ^2.8.3
  go_router: ^14.8.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
